<div class="navbar bg-base-100 shadow-lg mb-4">
  <div class="navbar-start">
    <a href="/" class="btn btn-ghost text-xl font-bold">AurexTrade</a>
  </div>
  <div class="navbar-center hidden lg:flex">
    <ul class="menu menu-horizontal px-1 gap-1">
      <li><a href="/" class="{% if request.url.path == '/' %}active{% endif %}">Home</a></li>
      <li><a href="/bot" class="{% if request.url.path == '/bot' %}active{% endif %}">Bot</a></li>
      <li>
        <details>
          <summary class="{% if request.url.path in ['/backtest', '/sweep', '/walk-forward'] %}active{% endif %}">Strategy Testing</summary>
          <ul class="bg-base-100 rounded-box z-10 w-48 p-2 shadow-lg">
            <li><a href="/backtest" class="{% if request.url.path == '/backtest' %}active{% endif %}">Backtest</a></li>
            <li><a href="/sweep" class="{% if request.url.path == '/sweep' %}active{% endif %}">Sweep</a></li>
            <li><a href="/walk-forward" class="{% if request.url.path == '/walk-forward' %}active{% endif %}">Walk-Forward</a></li>
          </ul>
        </details>
      </li>
      <li><a href="/settings" class="{% if request.url.path == '/settings' %}active{% endif %}">Settings</a></li>
      <li><a href="/guide/" class="{% if request.url.path.startswith('/guide') %}active{% endif %}">Guide</a></li>
    </ul>
  </div>
  <div class="navbar-end gap-2">
    {% if user %}
    <div class="dropdown dropdown-end">
      <div tabindex="0" role="button" class="btn btn-ghost btn-circle avatar">
        {% if user.avatar_url %}
        <div class="w-8 rounded-full">
          <img alt="Avatar" src="{{ user.avatar_url }}" referrerpolicy="no-referrer" />
        </div>
        {% else %}
        <div class="avatar placeholder">
          <div class="bg-neutral text-neutral-content rounded-full w-8">
            <span class="text-xs">{{ user.name[:2]|upper }}</span>
          </div>
        </div>
        {% endif %}
      </div>
      <ul tabindex="0" class="menu menu-sm dropdown-content mt-3 z-[1] p-2 shadow bg-base-100 rounded-box w-52">
        <li class="disabled"><a class="text-base-content/60">{{ user.name }}</a></li>
        <li class="disabled"><a class="text-base-content/40 text-xs">{{ user.email }}</a></li>
        <li class="mt-1">
          <form method="post" action="/auth/logout">
            <button type="submit" class="w-full text-left">Logout</button>
          </form>
        </li>
      </ul>
    </div>
    {% endif %}
    <div class="badge badge-outline badge-sm">v0.1.0</div>
  </div>
</div>
