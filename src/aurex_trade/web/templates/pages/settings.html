{% extends "base.html" %}
{% block title %}AurexTrade - Settings{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-4">Settings</h1>

<!-- Tabs -->
<div role="tablist" class="tabs tabs-bordered mb-4">
  <input type="radio" name="settings-tabs" role="tab" class="tab" aria-label="Broker" checked />
  <div role="tabpanel" class="tab-content pt-4">
    <div id="broker-form-container"
         hx-get="/api/broker/status"
         hx-trigger="load"
         hx-target="#broker-form-container"
         hx-swap="innerHTML">
      <span class="loading loading-spinner loading-sm"></span> Loading...
    </div>
  </div>

  <input type="radio" name="settings-tabs" role="tab" class="tab" aria-label="App" />
  <div role="tabpanel" class="tab-content pt-4">
    <div class="card bg-base-100 shadow-md">
      <div class="card-body">
        <h2 class="card-title text-lg">App Configuration</h2>
        <div id="settings-data" hx-get="/api/settings" hx-trigger="load" hx-swap="innerHTML">
          <span class="loading loading-spinner loading-sm"></span> Loading...
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
